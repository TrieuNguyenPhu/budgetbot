apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: {name: developer, namespace: demo}
rules:
  - apiGroups: ["", "apps", "argoproj.io"]
    resources: [pods, pods/log, services, deployments, replicasets, rollouts]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: {name: sre}
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, pods/exec]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: {name: viewer}
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: [get, list, watch]

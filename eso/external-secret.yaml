apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata: {name: budgetbot-db, namespace: demo}
spec:
  refreshInterval: 30s
  secretStoreRef: {name: aws-secrets-manager, kind: SecretStore}
  target:
    name: budgetbot-db
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef: {key: budgetbot/dev/database, property: password}

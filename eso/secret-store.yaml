apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata: {name: aws-secrets-manager, namespace: demo}
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        secretRef:
          accessKeyIDSecretRef: {name: aws-sm-credentials, key: access-key-id}
          secretAccessKeySecretRef: {name: aws-sm-credentials, key: secret-access-key}
